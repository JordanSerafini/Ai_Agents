  #   restart: always
  #   networks:
  #     - ai_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai_network
      
  redis:
    image: "redis:alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai_network

  ai_db:
    image: postgres:15-alpine
    container_name: ai_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init_db.sql:/docker-entrypoint-initdb.d/1_init_db.sql
    networks:
      - ai_network

volumes:
  # ollama_data:
  mongodb_data:
  postgres_data:

networks:
  ai_network:
    driver: bridge

