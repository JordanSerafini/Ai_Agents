  ollama:
    build:
      context: ./Backend/ollama_agent
      dockerfile: Dockerfile.ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama_agent:
    build:
      context: ./Backend/ollama_agent
      dockerfile: Dockerfile
    container_name: ollama_agent
    environment:
      - PORT=3002
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
    ports:
      - "3002:3002"
    restart: always
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai_network

  analyse_agent:
    build:
      context: ./Backend/analyse_agent
      dockerfile: Dockerfile
    container_name: analyse_agent
    environment:
      - PORT=3001
      - OLLAMA_SERVICE_URL=http://ollama_agent:3002
      - MONGODB_URI=mongodb://mongodb:27017/analyse_agent
      - NODE_ENV=development
      - LOG_LEVEL=info
      - JWT_SECRET=secret
      - JWT_EXPIRATION=1d
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - mongodb
      - ollama_agent
    networks:
      - ai_network

  # analyse_router:
  #   build:
  #     context: ./analyse_router
  #     dockerfile: Dockerfile
  #   container_name: analyse_router
  #   environment:
  #     - PORT=${ANALYSE_ROUTER_PORT}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #     - NODE_ENV=${NODE_ENV}
  #     - LOG_LEVEL=${LOG_LEVEL}
  #     - JWT_SECRET=${JWT_SECRET}
  #     - JWT_EXPIRATION=${JWT_EXPIRATION}
  #   expose:
  #     - "${ANALYSE_ROUTER_PORT}"
  #   restart: always
  #   networks:
  #     - ai_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai_network
      
  redis:
    image: "redis:alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai_network

  postgres:
    image: postgres:13
    container_name: ai_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../Database/init_db.sql:/docker-entrypoint-initdb.d/1_init_db.sql
      - ../Database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    networks:
      - ai_network

volumes:
  ollama_data:
  postgres_data:
  mongodb_data:

networks:
  ai_network:
    driver: bridge

