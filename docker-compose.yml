services:
  querybuilder_agent:
    build:
      context: ./Backend/querybuilder_agent
      dockerfile: Dockerfile
    container_name: querybuilder_agent
    restart: always
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - PG_HOST=ai_db
      - PG_PORT=5432
      - PG_USERNAME=postgres
      - PG_PASSWORD=postgres
      - PG_DATABASE=ai_db
      - USE_STATIC_METADATA=false
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    networks:
      - ai_network
    depends_on:
      - ai_db
      - elasticsearch

  elasticsearch_agent:
    build:
      context: ./Backend/elasticsearch_agent
      dockerfile: Dockerfile
    container_name: elasticsearch_agent
    restart: always
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    networks:
      - ai_network
    depends_on:
      - elasticsearch

  rag_agent:
    build:
      context: ./Backend/rag_agent
      dockerfile: Dockerfile
    container_name: rag_agent
    restart: always
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    networks:
      - ai_network
    depends_on:
      - elasticsearch

  analyse_agent:
    build:
      context: ./Backend/analyse_agent
      dockerfile: Dockerfile
    container_name: analyse_agent
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QUERYBUILDER_AGENT_URL=http://querybuilder_agent:3002
      - ELASTICSEARCH_AGENT_URL=http://elasticsearch_agent:3003
      - RAG_AGENT_URL=http://rag_agent:3004
      - WORKFLOW_AGENT_URL=http://workflow_agent:3005
      - API_AGENT_URL=http://api_agent:3006
    networks:
      - ai_network
    depends_on:
      - querybuilder_agent
      - elasticsearch_agent
      - rag_agent

  # mongodb:
  #   image: mongo:latest
  #   container_name: mongodb
  #   restart: always
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - ai_network
      
  redis:
    image: "redis:alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai_network

  ai_db:
    image: postgres:15-alpine
    container_name: ai_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init_db.sql:/docker-entrypoint-initdb.d/1_init_db.sql
      - ./Database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    networks:
      - ai_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - xpack.security.authc.api_key.enabled=true
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch-setup.sh:/usr/local/bin/elasticsearch-setup.sh
    networks:
      - ai_network
    restart: unless-stopped
    command: >
      bash -c "
        echo 'Waiting for Elasticsearch to start...'
        sleep 30
        echo 'Creating service account for Kibana...'
        bin/elasticsearch-service-tokens create elastic/kibana kibana-token > /tmp/kibana-token
        cat /tmp/kibana-token
        tail -f /dev/null
      "

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=AAEAAWVsYXN0aWMva2liYW5hL2tpYmFuYS10b2tlbjpkdW1teXRva2Vu
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ai_network
    restart: unless-stopped

volumes:
  # ollama_data:
  mongodb_data:
  postgres_data:
  elasticsearch_data:

networks:
  ai_network:
    driver: bridge

