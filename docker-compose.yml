  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: serve
    networks:
      - ai_network

  ollama_init:
    image: curlimages/curl:latest
    container_name: ollama_init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 10 && 
      echo 'Vérification de la disponibilité du service Ollama...' &&
      until curl -s http://ollama:11434/api/tags > /dev/null; do
        echo 'En attente du service Ollama...'
        sleep 5
      done &&
      echo 'Service Ollama disponible. Vérification du modèle mistral...' &&
      if ! curl -s http://ollama:11434/api/tags | grep -q mistral; then
        echo 'Téléchargement du modèle mistral...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral\"}' &&
        echo 'Attente de la fin du téléchargement...' &&
        until curl -s http://ollama:11434/api/tags | grep -q mistral; do
          echo 'Modèle toujours en cours de téléchargement...'
          sleep 10
        done &&
        echo 'Modèle mistral téléchargé avec succès!'
      else
        echo 'Le modèle mistral est déjà disponible.'
      fi &&
      echo 'Initialisation terminée!'"
    networks:
      - ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ollama:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama_agent:
    build:
      context: ./Backend/ollama_agent
      dockerfile: Dockerfile
    container_name: ollama_agent
    environment:
      - NODE_ENV=development
      - OLLAMA_SERVICE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
    ports:
      - "3002:3002"
    restart: always
    depends_on:
      ollama_init:
        condition: service_completed_successfully
    networks:
      - ai_network

  analyse_agent:
    build:
      context: ./Backend/analyse_agent
      dockerfile: Dockerfile
    container_name: analyse_agent
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - OLLAMA_SERVICE_URL=http://ollama_agent:3002
      - MONGODB_URI=mongodb://mongodb:27017/ai_db
      - POSTGRES_HOST=ai_db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ai_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      ollama_agent:
        condition: service_started
      mongodb:
        condition: service_started
      ai_db:
        condition: service_started
    networks:
      - ai_network

  # analyse_router:
  #   build:
  #     context: ./analyse_router
  #     dockerfile: Dockerfile
  #   container_name: analyse_router
  #   environment:
  #     - PORT=${ANALYSE_ROUTER_PORT}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #     - NODE_ENV=${NODE_ENV}
  #     - LOG_LEVEL=${LOG_LEVEL}
  #     - JWT_SECRET=${JWT_SECRET}
  #     - JWT_EXPIRATION=${JWT_EXPIRATION}
  #   expose:
  #     - "${ANALYSE_ROUTER_PORT}"
  #   restart: always
  #   networks:
  #     - ai_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai_network
      
  redis:
    image: "redis:alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai_network

  ai_db:
    image: postgres:15-alpine
    container_name: ai_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init_db.sql:/docker-entrypoint-initdb.d/1_init_db.sql
    networks:
      - ai_network

volumes:
  ollama_data:
  mongodb_data:
  postgres_data:

networks:
  ai_network:
    driver: bridge

