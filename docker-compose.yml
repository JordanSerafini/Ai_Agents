services:
  database_agent:
    build:
      context: ./Backend/database_agent
      dockerfile: Dockerfile
    container_name: database_agent
    restart: always
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=ai_db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=ai_db
    networks:
      - ai_network
    depends_on:
      - ai_db

  analyse_agent:
    build:
      context: ./Backend/analyse_agent
      dockerfile: Dockerfile
    container_name: analyse_agent
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_AGENT_URL=http://database_agent:3002
      - WORKFLOW_AGENT_URL=http://workflow_agent:3003
      - MONGODB_URI=mongodb://mongodb:27017/analyse_agent
    networks:
      - ai_network
    depends_on:
      - mongodb
      - database_agent


